services:
  frontend:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    container_name: pcb_mvt_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DJANGO_API_ORIGIN=${DJANGO_API_ORIGIN:-http://host.docker.internal:8000}
