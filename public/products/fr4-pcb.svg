<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="board" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3d2e"/>
      <stop offset="100%" stop-color="#0d2818"/>
    </linearGradient>
    <linearGradient id="trace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8893a"/>
      <stop offset="100%" stop-color="#e8b060"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g filter="url(#shadow)" transform="rotate(-8 240 180)">
    <rect x="70" y="90" width="340" height="220" rx="12" fill="url(#board)" stroke="#2a5a42" stroke-width="2"/>
    <rect x="90" y="110" width="80" height="60" rx="4" fill="#111" stroke="url(#trace)" stroke-width="1.5"/>
    <rect x="190" y="120" width="120" height="80" rx="6" fill="#0a0a0a" stroke="url(#trace)" stroke-width="2"/>
    <rect x="330" y="115" width="60" height="45" rx="3" fill="#111" stroke="url(#trace)" stroke-width="1.5"/>
    <path d="M130 200 H350 M130 230 H280 M130 260 H320" stroke="url(#trace)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="160" cy="200" r="6" fill="url(#trace)"/>
    <circle cx="220" cy="230" r="5" fill="url(#trace)"/>
    <circle cx="300" cy="260" r="5" fill="url(#trace)"/>
    <circle cx="360" cy="200" r="4" fill="url(#trace)"/>
    <circle cx="110" cy="280" r="4" fill="url(#trace)"/>
    <circle cx="380" cy="280" r="4" fill="url(#trace)"/>
  </g>
  <g filter="url(#shadow)" transform="rotate(12 240 180)">
    <rect x="180" y="40" width="160" height="110" rx="8" fill="url(#board)" stroke="#2a5a42" stroke-width="2"/>
    <rect x="200" y="58" width="50" height="35" rx="3" fill="#111" stroke="url(#trace)" stroke-width="1.5"/>
    <path d="M210 110 H310 M240 85 V125" stroke="url(#trace)" stroke-width="2.5" stroke-linecap="round"/>
